<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI自动记账 App 原型（单页全量）</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <style>
      :root{
        --bg:#0b1020;
        --panel:rgba(255,255,255,.06);
        --panel2:rgba(255,255,255,.085);
        --stroke:rgba(255,255,255,.12);
        --text:rgba(255,255,255,.9);
        --muted:rgba(255,255,255,.62);
        --muted2:rgba(255,255,255,.42);
        --brand:#6d5efc;
        --brand2:#2ad1ff;
        --good:#38d996;
        --warn:#ffb020;
        --bad:#ff4d6d;
        --shadow:0 18px 50px rgba(0,0,0,.52);
        --r:18px;
        --r2:14px;
        --pw:360px;
        --ph:780px;
      }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0;
        color:var(--text);
        font-family:Inter,"Noto Sans SC",system-ui,-apple-system,"Segoe UI",Roboto,Arial,"Microsoft YaHei",sans-serif;
        background:
          radial-gradient(1200px 800px at 10% 10%, rgba(109,94,252,.25), transparent 60%),
          radial-gradient(1000px 700px at 90% 20%, rgba(42,209,255,.18), transparent 55%),
          radial-gradient(900px 700px at 70% 90%, rgba(56,217,150,.14), transparent 55%),
          var(--bg);
      }
      a{color:inherit;text-decoration:none}
      .shell{display:grid;grid-template-columns:320px 1fr;min-height:100vh}
      .side{
        position:sticky;top:0;height:100vh;padding:22px 18px;
        border-right:1px solid var(--stroke);
        background:rgba(0,0,0,.25);
        backdrop-filter:blur(12px);
      }
      .brand{display:flex;align-items:center;gap:12px;padding:10px 10px 16px;border-bottom:1px solid var(--stroke)}
      .logo{
        width:40px;height:40px;border-radius:12px;display:grid;place-items:center;
        background:linear-gradient(135deg,var(--brand),var(--brand2));
        border:1px solid rgba(255,255,255,.12);
        box-shadow:0 14px 30px rgba(109,94,252,.28);
      }
      .bt{font-weight:800;letter-spacing:.2px}
      .bs{font-size:12px;color:var(--muted);margin-top:3px}
      .hint{margin:14px 10px 18px;color:var(--muted);font-size:12px}
      .toc{height:calc(100vh - 150px);overflow:auto;padding:0 6px 10px}
      .toc h3{margin:14px 6px 8px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted2)}
      .toc a{
        display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:12px;
        color:var(--muted);border:1px solid transparent;
      }
      .toc a:hover{background:rgba(255,255,255,.05);color:var(--text)}
      .toc a.active{
        background:linear-gradient(135deg, rgba(109,94,252,.22), rgba(42,209,255,.10));
        border-color:rgba(109,94,252,.34);
        color:rgba(255,255,255,.92);
      }
      .tag{
        margin-left:auto;font-size:11px;color:rgba(255,255,255,.72);
        padding:2px 8px;border-radius:999px;background:rgba(255,255,255,.08);
        border:1px solid rgba(255,255,255,.12);
      }
      .main{padding:22px 22px 60px}
      .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 6px 18px;border-bottom:1px solid var(--stroke);margin-bottom:18px}
      .topbar h1{font-size:18px;margin:0;letter-spacing:.1px}
      .meta{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
      .pill{
        display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;
        background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--muted);font-size:12px
      }
      .pill strong{color:rgba(255,255,255,.9);font-weight:700}
      .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(calc(var(--pw) + 22px),1fr));gap:22px;align-items:start}
      .board{padding:12px;border-radius:18px;border:1px solid var(--stroke);background:rgba(0,0,0,.18);box-shadow:0 30px 80px rgba(0,0,0,.25)}
      .head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:10px 10px 12px}
      .title{font-weight:800;letter-spacing:.2px;display:flex;align-items:center;gap:10px}
      .desc{color:var(--muted);font-size:12px;margin-top:4px}
      .actions{display:flex;gap:8px;align-items:center}
      .btn{
        display:inline-flex;align-items:center;gap:8px;border-radius:12px;padding:8px 10px;font-size:12px;
        color:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);cursor:pointer
      }
      .btn:hover{background:rgba(255,255,255,.09)}
      .btn.primary{
        background:linear-gradient(135deg, rgba(109,94,252,.95), rgba(42,209,255,.65));
        border-color:rgba(109,94,252,.55);color:rgba(255,255,255,.95)
      }
      .phone{
        width:var(--pw);height:var(--ph);margin:0 auto 10px;position:relative;overflow:hidden;
        border-radius:36px;border:1px solid rgba(255,255,255,.18);
        background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)), rgba(10,14,28,.82);
        box-shadow:var(--shadow);
      }
      .phone:before{
        content:"";position:absolute;top:10px;left:50%;transform:translateX(-50%);
        width:130px;height:28px;border-radius:18px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.08);
      }
      .sb{height:46px;padding:14px 16px 0;display:flex;justify-content:space-between;align-items:center;color:rgba(255,255,255,.82);font-size:12px}
      .sbr{display:flex;gap:8px;align-items:center}
      .screen{height:calc(100% - 46px);padding:14px 14px 16px;display:flex;flex-direction:column;gap:12px}
      .nav{display:flex;align-items:center;justify-content:space-between;gap:10px}
      .nav .t{font-weight:800;letter-spacing:.2px}
      .ib{
        width:36px;height:36px;border-radius:12px;display:grid;place-items:center;
        background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.9);
      }
      .card{border-radius:var(--r);border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);padding:14px}
      .card.soft{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.10)}
      .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
      .muted{color:var(--muted)}
      .muted2{color:var(--muted2)}
      .h2{font-weight:900;font-size:16px;margin:0}
      .h3{font-weight:800;font-size:13px;margin:0;letter-spacing:.2px}
      .small{font-size:12px}
      .divider{height:1px;background:rgba(255,255,255,.10);margin:10px 0}
      .badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:4px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}
      .badge.good{border-color:rgba(56,217,150,.35);background:rgba(56,217,150,.12)}
      .badge.warn{border-color:rgba(255,176,32,.35);background:rgba(255,176,32,.12)}
      .badge.bad{border-color:rgba(255,77,109,.35);background:rgba(255,77,109,.12)}
      .chipset{display:flex;gap:8px;flex-wrap:wrap}
      .chip{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);font-size:12px}
      .list{display:flex;flex-direction:column;gap:10px}
      .item{
        display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:center;
        padding:10px 12px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05)
      }
      .ico{
        width:42px;height:42px;border-radius:14px;display:grid;place-items:center;
        border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.18)
      }
      .it{font-weight:750}
      .is{color:var(--muted);font-size:12px;margin-top:2px}
      .money{font-weight:900;letter-spacing:.2px}
      .money.in{color:rgba(56,217,150,.95)}
      .money.out{color:rgba(255,77,109,.95)}
      .tabs{
        margin-top:auto;border-radius:18px;border:1px solid rgba(255,255,255,.12);
        background:rgba(0,0,0,.24);padding:10px 12px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px
      }
      .tab{padding:8px 6px;border-radius:14px;display:grid;gap:4px;place-items:center;color:rgba(255,255,255,.72);border:1px solid transparent}
      .tab.active{color:rgba(255,255,255,.92);background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12)}
      .tab i{font-size:16px}
      .tab span{font-size:11px}
      .search{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05)}
      .search input{width:100%;border:0;outline:0;background:transparent;color:rgba(255,255,255,.9);font-size:13px}
      .input{display:flex;flex-direction:column;gap:7px}
      .input label{font-size:12px;color:var(--muted)}
      .field{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05)}
      .field input,.field select{width:100%;background:transparent;border:0;outline:0;color:rgba(255,255,255,.9);font-size:13px}
      .field select{appearance:none}
      .seg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
      .opt{padding:10px 12px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between;font-size:13px}
      .opt.active{border-color:rgba(109,94,252,.55);background:linear-gradient(135deg, rgba(109,94,252,.22), rgba(42,209,255,.08))}
      .progress{height:10px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);overflow:hidden}
      .progress>div{height:100%;border-radius:999px;background:linear-gradient(90deg, rgba(109,94,252,.92), rgba(42,209,255,.75))}
      .chat{display:flex;flex-direction:column;gap:10px;flex:1;min-height:0}
      .bubbles{flex:1;overflow:auto;display:flex;flex-direction:column;gap:10px;padding-right:6px}
      .bubble{max-width:88%;padding:10px 12px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);font-size:13px}
      .bubble.me{margin-left:auto;background:linear-gradient(135deg, rgba(109,94,252,.28), rgba(42,209,255,.12));border-color:rgba(109,94,252,.32)}
      .composer{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:10px;border-radius:18px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.22)}
      .composer input{background:transparent;border:0;outline:0;color:rgba(255,255,255,.92);font-size:13px;padding:6px 4px}
      .sheet{border-radius:22px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.28);padding:12px}
      .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
      .kv{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
      .k{color:var(--muted);font-size:12px}
      .v{font-weight:800;font-size:12px}
      .switch{width:46px;height:26px;border-radius:999px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);position:relative}
      .switch:after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:999px;background:rgba(255,255,255,.88)}
      .switch.on{background:rgba(56,217,150,.22);border-color:rgba(56,217,150,.35)}
      .switch.on:after{left:22px;background:rgba(255,255,255,.92)}
      .voice{display:grid;place-items:center;height:280px}
      .mic{
        width:120px;height:120px;border-radius:999px;display:grid;place-items:center;position:relative;
        background:linear-gradient(135deg, rgba(109,94,252,.95), rgba(42,209,255,.65));
        border:1px solid rgba(255,255,255,.2);box-shadow:0 25px 70px rgba(109,94,252,.35)
      }
      .mic:before,.mic:after{content:"";position:absolute;inset:-14px;border-radius:999px;border:1px solid rgba(109,94,252,.22)}
      .mic:after{inset:-28px;border-color:rgba(42,209,255,.16)}
      .receipt{height:210px;border-radius:18px;border:1px dashed rgba(255,255,255,.18);background:rgba(255,255,255,.04);display:grid;place-items:center;gap:10px}
      .rbox{width:78%;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);padding:12px}
      .line{height:9px;border-radius:999px;background:rgba(255,255,255,.12);margin:8px 0}
      .lw{width:85%}.lm{width:65%}.ls{width:45%}
      @media (max-width:980px){
        .shell{grid-template-columns:1fr}
        .side{position:relative;height:auto;border-right:0;border-bottom:1px solid var(--stroke)}
        .toc{height:auto;max-height:360px}
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="side">
        <div class="brand">
          <div class="logo"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
          <div>
            <div class="bt">AI自动记账</div>
            <div class="bs">单页全量原型 · 可直接对照开发</div>
          </div>
        </div>
        <div class="hint">目录跳转 + 屏内按钮跳转，便于路由/组件拆分。</div>
        <nav class="toc" id="toc"></nav>
      </aside>
      <main class="main">
        <div class="topbar">
          <h1>AI自动记账 App · 全量原型界面（单页HTML）</h1>
          <div class="meta">
            <div class="pill"><i class="fa-solid fa-route"></i><strong>核心流程</strong>采集 → 识别 → 归类 → 复核 → 分析</div>
            <div class="pill"><i class="fa-solid fa-shield"></i><strong>数据</strong>本地+云同步 · 可导出</div>
            <div class="pill"><i class="fa-solid fa-code"></i><strong>落地</strong>每屏可直接映射路由</div>
          </div>
        </div>
        <div class="grid" id="grid"></div>
      </main>
    </div>

    <template id="boardTpl">
      <section class="board">
        <div class="head">
          <div>
            <div class="title"></div>
            <div class="desc"></div>
          </div>
          <div class="actions"></div>
        </div>
        <div class="phone">
          <div class="sb">
            <div>09:41</div>
            <div class="sbr"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></div>
          </div>
          <div class="screen"></div>
        </div>
      </section>
    </template>

    <script>
      const screens = [
        { group: "起步", id: "splash", icon: "fa-bolt", tag: "0", title: "启动页", desc: "冷启动加载、初始化账本与同步状态", actions: [{ href: "#onboarding", text: "下一步", icon: "fa-arrow-right" }], html: `
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;height:100%;">
            <div style="width:86px;height:86px;border-radius:26px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;border:1px solid rgba(255,255,255,.14);box-shadow:0 30px 70px rgba(109,94,252,.35);">
              <i class="fa-solid fa-wand-magic-sparkles" style="font-size:34px;color:rgba(255,255,255,.95);"></i>
            </div>
            <div style="text-align:center;">
              <div style="font-size:22px;font-weight:900;letter-spacing:.4px;">AI自动记账</div>
              <div class="muted" style="margin-top:6px;">更快 · 更准 · 更省心</div>
            </div>
            <div class="card soft" style="width:92%;">
              <div class="row"><div class="small muted">初始化账本与规则</div><div class="badge good"><i class="fa-solid fa-circle-notch fa-spin"></i>进行中</div></div>
              <div class="divider"></div>
              <div class="row"><div class="small muted">同步最近7天流水</div><div class="badge warn"><i class="fa-solid fa-cloud-arrow-down"></i>等待</div></div>
            </div>
            <div class="muted2 small">首次使用建议绑定微信/支付宝/银行卡以提升自动化程度</div>
          </div>` },

        { group: "起步", id: "onboarding", icon: "fa-layer-group", tag: "3", title: "引导页（3屏合并展示）", desc: "价值传达 + 权限引导（通知/相机/语音）", actions: [{ href: "#auth", text: "去登录", icon: "fa-arrow-right" }], html: `
          <div class="nav">
            <div class="badge">跳过</div>
            <div class="badge">1 / 3</div>
          </div>
          <div class="card" style="text-align:center;">
            <div style="width:70px;height:70px;margin:0 auto 10px;border-radius:22px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);display:grid;place-items:center;">
              <i class="fa-solid fa-wand-magic" style="font-size:26px;color:rgba(255,255,255,.9);"></i>
            </div>
            <div style="font-weight:900;font-size:18px;">一句话自动记账</div>
            <div class="muted small" style="margin-top:8px;">例如：今晚聚餐 268，用信用卡</div>
            <div class="divider"></div>
            <div class="seg">
              <div class="opt active"><span>AI自动识别</span><span class="muted small"><i class="fa-solid fa-bolt"></i></span></div>
              <div class="opt"><span>可手动修改</span><span class="muted small"><i class="fa-solid fa-pen"></i></span></div>
            </div>
          </div>
          <div class="card soft">
            <div class="row"><div><div class="h3">需要权限</div><div class="small muted">相机用于小票/发票识别</div></div><div class="switch on"></div></div>
            <div class="divider"></div>
            <div class="row"><div class="small muted">语音用于快速口述记账</div><div class="switch on"></div></div>
          </div>
          <div class="row" style="gap:10px;">
            <a class="btn" href="#auth" style="flex:1;justify-content:center;">下一步</a>
            <a class="btn primary" href="#auth" style="flex:1;justify-content:center;"><i class="fa-solid fa-check"></i>开始使用</a>
          </div>` },

        { group: "起步", id: "auth", icon: "fa-fingerprint", tag: "1", title: "登录 / 注册", desc: "手机号一键登录 + 第三方登录（微信/Apple）", actions: [{ href: "#connect", text: "登录后", icon: "fa-arrow-right" }], html: `
          <div class="nav">
            <div class="ib"><i class="fa-solid fa-xmark"></i></div>
            <div class="t">欢迎回来</div>
            <div class="badge">隐私</div>
          </div>
          <div class="card">
            <div style="font-size:20px;font-weight:900;">登录后自动同步账本</div>
            <div class="muted small" style="margin-top:6px;">支持多端登录 · 端到端加密可选</div>
            <div class="divider"></div>
            <div class="input">
              <label>手机号</label>
              <div class="field"><i class="fa-solid fa-mobile-screen"></i><input value="138 0000 0000"/></div>
            </div>
            <div class="input" style="margin-top:10px;">
              <label>验证码</label>
              <div class="field"><i class="fa-solid fa-shield-halved"></i><input value="123456"/><span class="badge">获取验证码</span></div>
            </div>
            <div class="row" style="margin-top:12px;gap:10px;">
              <a class="btn primary" href="#connect" style="flex:1;justify-content:center;"><i class="fa-solid fa-arrow-right-to-bracket"></i>登录</a>
              <a class="btn" href="#connect" style="flex:1;justify-content:center;"><i class="fa-brands fa-weixin"></i>微信</a>
            </div>
            <div class="row" style="margin-top:10px;">
              <span class="small muted">登录即同意《用户协议》《隐私政策》</span>
              <span class="small muted">离线使用</span>
            </div>
          </div>` },

        { group: "起步", id: "connect", icon: "fa-link", tag: "1", title: "绑定账户（可跳过）", desc: "提升自动识别：交易对账、自动分类、重复消费提醒", actions: [{ href: "#home", text: "进入首页", icon: "fa-arrow-right" }], html: `
          <div class="nav">
            <a class="ib" href="#auth"><i class="fa-solid fa-chevron-left"></i></a>
            <div class="t">连接账户</div>
            <a class="badge" href="#home">跳过</a>
          </div>
          <div class="card">
            <div class="h2">选择要连接的数据源</div>
            <div class="muted small" style="margin-top:6px;">你可随时在设置中管理绑定与同步频率</div>
            <div class="divider"></div>

      function tabs(activeId){
        const items = [
          { id:"home", icon:"fa-house", text:"首页" },
          { id:"ledger", icon:"fa-list", text:"明细" },
          { id:"ai-chat", icon:"fa-wand-magic-sparkles", text:"AI" },
          { id:"analytics", icon:"fa-chart-simple", text:"统计" },
          { id:"me", icon:"fa-user", text:"我的" },
        ];
        return `<div class="tabs">` + items.map(it => {
          const on = it.id === activeId ? "active" : "";
          return `<a class="tab ${on}" href="#${it.id}"><i class="fa-solid ${it.icon}"></i><span>${it.text}</span></a>`;
        }).join("") + `</div>`;
      }

      function elFrom(html){
        const t = document.createElement("template");
        t.innerHTML = html.trim();
        return t.content.firstElementChild;
      }

      function render(){
        const toc = document.getElementById("toc");
        const grid = document.getElementById("grid");
        const tpl = document.getElementById("boardTpl");

        const grouped = screens.reduce((acc, s) => {
          acc[s.group] ||= [];
          acc[s.group].push(s);
          return acc;
        }, {});

        toc.innerHTML = Object.keys(grouped).map(g => {
          const links = grouped[g].map(s => `
            <a href="#${s.id}" data-id="${s.id}">
              <i class="fa-solid ${s.icon}"></i><span>${s.title}</span><span class="tag">${s.tag}</span>
            </a>
          `).join("");
          return `<h3>${g}</h3>${links}`;
        }).join("");

        for (const s of screens){
          const node = tpl.content.cloneNode(true);
          const section = node.querySelector("section");
          section.id = s.id;
          section.querySelector(".title").innerHTML = `<i class="fa-solid ${s.icon}"></i>${s.title}`;
          section.querySelector(".desc").textContent = s.desc;

          const actions = section.querySelector(".actions");
          actions.innerHTML = (s.actions || []).map(a =>
            `<a class="btn ${a.primary ? "primary" : ""}" href="${a.href}"><i class="fa-solid ${a.icon}"></i>${a.text}</a>`
          ).join("");

          section.querySelector(".screen").innerHTML = s.html;
          grid.appendChild(node);
        }

        const links = Array.from(toc.querySelectorAll("a[data-id]"));
        const io = new IntersectionObserver((entries) => {
          for (const e of entries){
            if (!e.isIntersecting) continue;
            const id = e.target.getAttribute("id");
            links.forEach(a => a.classList.toggle("active", a.dataset.id === id));
          }
        }, { root: null, threshold: 0.18 });

        screens.forEach(s => {
          const sec = document.getElementById(s.id);
          if (sec) io.observe(sec);
        });
      }

      render();
    </script>
